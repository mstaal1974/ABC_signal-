# .streamlit/secrets.toml
#
# Copy this file to .streamlit/secrets.toml and fill in real values.
# NEVER commit the real secrets.toml to git.
#
# Add this to .gitignore (it should already be there):
#   .streamlit/secrets.toml

[api_keys]
gemini    = "PASTE_GEMINI_API_KEY_HERE"     # https://aistudio.google.com/apikey
anthropic = "PASTE_ANTHROPIC_API_KEY_HERE"  # https://console.anthropic.com

# --- Supabase Auth ---
#
# Users are managed in the Supabase dashboard, not in this file.
#
# First-time setup:
#   1. Create a project at https://supabase.com.
#      For an Australian RTO, pick the Sydney region (ap-southeast-2).
#      You CANNOT change region later — get this right at creation.
#   2. Settings > Data API > copy:
#        - Project URL    -> the `url` below
#        - "anon public"  -> the `anon_key` below
#      Do NOT use the `service_role` key here — it has admin rights.
#   3. Authentication > Providers > Email:
#      If your team is small and admin-managed, toggle "Confirm email" OFF
#      so manually-created users can log in without an email round-trip.
#   4. Authentication > Users > Add user. Set the email and password.
#      If you left "Confirm email" ON, tick "Auto Confirm User" so the
#      user can log in immediately.
[supabase]
url      = "https://your-project-ref.supabase.co"
anon_key = "PASTE_SUPABASE_ANON_PUBLIC_KEY_HERE"
